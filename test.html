<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سایتا پویا</title>
  <style>
    body {
      font-family: 'Vazirmatn', sans-serif; /* فونت فارسی */
      background-color: #f0f0f0;
      margin: 0;
      display: flex;
      flex-direction: column; /* تغییر به flex-direction: column */
      align-items: center;
      min-height: 100vh; /* حداقل ارتفاع صفحه */
    }

    .container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 800px;
      margin-top: 20px; /* margin-top اضافه شد */
    }

    .post {
      border-bottom: 1px solid #ddd;
      padding: 15px 0; /* افزایش padding */
      margin-bottom: 10px;
    }

    .post:last-child {
      border-bottom: none;
    }

    .post h2 {
      color: #007BFF;
      margin-bottom: 5px; /* margin-bottom اضافه شد */
    }

    .post p {
      line-height: 1.5; /* بهبود خوانایی */
    }

    .post small {
      color: #6c757d; /* رنگ خاکستر */
      display: block;
      margin-top: 5px;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jalaali-moment@1.0.7/dist/jalaali-moment.browser.js"></script>
</head>
<body>
  <div class="container">
    <h2>پست‌های جدید</h2>
    <div id="postDiv"></div>
  </div>

  <script>
    const firebaseConfig = {
      // ...
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function convertToJalali(gregorianDate) {
      return moment(gregorianDate).locale('fa').format('YYYY/MM/DD HH:mm');
    }

    const postsRef = database.ref('posts');

    postsRef.on('value', snapshot => {
      const posts = snapshot.val();
      const postDiv = document.getElementById('postDiv');
      postDiv.innerHTML = '';

      if (posts) { // بررسی وجود پست ها
        Object.values(posts).forEach(post => { // استفاده از Object.values برای حلقه زدن روی مقادیر
          const postElement = document.createElement('div');
          postElement.className = 'post';
          postElement.innerHTML = `<h2>${post.title}</h2><p>${post.content}</p><small>${convertToJalali(post.date)}</small>`;
          postDiv.appendChild(postElement);
        });
      } else { // نمایش پیام در صورت عدم وجود پست
        postDiv.innerHTML = '<p>هیچ پستی وجود ندارد.</p>';
      }
    });
  </script>
</body>
</html>
