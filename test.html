<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت پویا</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Vazirmatn', Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .post {
            border-bottom: 1px solid #e9ecef;
            padding: 15px 0;
            transition: background-color 0.3s ease;
        }
        .post:hover {
            background-color: #f1f3f5;
        }
        .post h2 {
            color: #0d6efd;
            font-size: 1.3rem;
        }
        .post small {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4 text-center">پست‌های جدید</h2>
        <div id="postDiv"></div>
    </div>

    <!-- Firebase و کتابخانه‌های مورد نیاز -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jalali-moment@2.3.1/dist/jalali-moment.browser.js"></script>

    <script>
        // تنظیمات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAkcPNZ2abXSvkmQXarzyLusaUfxmjvQBY",
      authDomain: "posts-c6064.firebaseapp.com",
      databaseURL: "https://posts-c6064-default-rtdb.firebaseio.com",
      projectId: "posts-c6064",
      storageBucket: "posts-c6064.firebaseapp.com",
      messagingSenderId: "488072882750",
      appId: "1:488072882750:web:015f21f3e26832ce913f6f",
      measurementId: "G-2NCP62MSEV"
        };
    
        // مقداردهی اولیه Firebase
        firebase.initializeApp(firebaseConfig);

        // تابع تبدیل تاریخ میلادی به شمسی
        function convertToJalali(gregorianDate) {
            return moment(gregorianDate).locale('fa').format('YYYY/MM/DD HH:mm');
        }

        function displayPosts() {
            const postsRef = firebase.database().ref('posts');
            postsRef.on('value', (snapshot) => {
                const posts = snapshot.val();
                const postDiv = document.getElementById('postDiv');
                postDiv.innerHTML = '';
                
                if (posts) {
                    Object.entries(posts).forEach(([key, post]) => {
                        const postElement = document.createElement('div');
                        postElement.className = 'post';
                        postElement.innerHTML = `
                            <h2>${post.title}</h2>
                            <p>${post.content}</p>
                            <small>${convertToJalali(post.date)}</small>
                        `;
                        postDiv.appendChild(postElement);
                    });
                } else {
                    postDiv.innerHTML = '<p class="text-center text-muted">پستی یافت نشد</p>';
                }
            });
        }

        // نمایش پست‌ها پس از بارگذاری صفحه
        window.addEventListener('DOMContentLoaded', displayPosts);
    </script>
</body>
</html>
