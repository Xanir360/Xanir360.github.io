<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سایت پویا</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 800px;
      margin-top: 20px;
    }
    .post {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
      margin-bottom: 10px;
    }
    .post:last-child {
      border-bottom: none;
    }
    .post h2 {
      color: #007BFF;
      margin-bottom: 5px;
    }
    .post p {
      line-height: 1.5;
    }
    .post small {
      color: #6c757d;
      display: block;
      margin-top: 5px;
    }
  </style>
  <!-- افزودن پیکربندی Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>
  <!-- افزودن اسکریپت moment و jalali-moment -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jalali-moment/3.3.10/jalali-moment.min.js"></script>
  <script>
    // تنظیمات Firebase که از داشبورد Firebase کپی کرده‌اید را در اینجا قرار دهید.
    const firebaseConfig = {
      apiKey: "AIzaSyAkcPNZ2abXSvkmQXarzyLusaUfxmjvQBY",
      authDomain: "posts-c6064.firebaseapp.com",
      databaseURL: "https://posts-c6064-default-rtdb.firebaseio.com",
      projectId: "posts-c6064",
      storageBucket: "posts-c6064.firebaseapp.com",
      messagingSenderId: "488072882750",
      appId: "1:488072882750:web:015f21f3e26832ce913f6f",
      measurementId: "G-2NCP62MSEV"
    };
    
    // مقداردهی اولیه Firebase
    firebase.initializeApp(firebaseConfig);

    // تابع تبدیل تاریخ میلادی به شمسی
    function convertToJalali(gregorianDate) {
      const date = moment(gregorianDate);
      return date.locale('fa').format('YYYY/MM/DD HH:mm');
    }

    async function displayPosts() {
      const postsRef = firebase.database().ref('posts');
      postsRef.on('value', (snapshot) => {
        const posts = snapshot.val();
        const postDiv = document.getElementById('postDiv');
        postDiv.innerHTML = '';
        for (let key in posts) {
          const post = posts[key];
          const postElement = document.createElement('div');
          postElement.className = 'post';
          postElement.innerHTML = `<h2>${post.title}</h2><p>${post.content}</p><small>${convertToJalali(post.date)}</small>`;
          postDiv.appendChild(postElement);
        }
      });
    }

    // نمایش پست‌ها پس از بارگذاری صفحه
    window.onload = displayPosts;
  </script>
</head>
<body>
  <div class="container">
    <h2>پست‌های جدید</h2>
    <div id="postDiv"></div>
  </div>
</body>
</html>
